training:
  name: high_dim_double_dqn
  algorithm: high_dim_double_dqn
  result_root: results
  firm_id: 1
  num_episodes: 1500
  test_episodes: 20
  seed: 42
  seed_offset: 100
  eps_start: 1.0
  eps_end: 0.01
  eps_decay: 0.995

dqn:
  buffer_size: 10000
  batch_size: 64
  gamma: 0.99
  learning_rate: 0.001
  tau: 0.001
  update_every: 4

high_dim:
  order_dim: 3
  order_levels: [0, 5, 10, 15, 20]
  order_cost_multipliers: [1.0, 1.1, 1.25]
  min_total_order: 5
  max_total_order: 20

hydra:
  job:
    chdir: false
  run:
    dir: .
  output_subdir: null
